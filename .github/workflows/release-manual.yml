name: Create release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v0.0.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag exists
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG does not exist" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
